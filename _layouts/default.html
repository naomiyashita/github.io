<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    
      <div class="header-right">
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/cv/' | relative_url }}">CV</a>
          <a href="{{ '/contact/' | relative_url }}">Contact</a>
          <a href="{{ '/links/' | relative_url }}">Links</a>
        </nav>
    
        <div class="language-switcher">
          <label for="language-select">Language</label>
          <select id="language-select" aria-label="Language selector">
            <option value="{{ '/' | relative_url }}" {% if page.lang != "en" %}selected{% endif %}>日本語</option>
            <option value="{{ '/en/' | relative_url }}" {% if page.lang == "en" %}selected{% endif %}>English</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </div>
  </footer>
  
  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/cite.js' | relative_url }}"></script>
  
</body>
</html>
